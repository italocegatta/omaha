name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "uv"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff check
        run: uv run ruff check src tests alembic

      - name: Ruff format check
        run: uv run ruff format --check src tests alembic

  test-unit:
    name: test-unit
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "uv"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run unit tests
        run: uv run task test-unit

  test-integration:
    name: test-integration
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "uv"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run integration tests
        run: uv run task test-integration

  test-bdd:
    name: test-bdd
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "uv"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run BDD tests
        run: uv run task test-bdd

  coverage:
    name: coverage
    needs: [test-unit, test-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "uv"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Generate coverage XML
        run: |
          mkdir -p reports
          uv run pytest -m "unit or integration" -q --ignore=tests/e2e/_disabled

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage.xml
          retention-days: 30
