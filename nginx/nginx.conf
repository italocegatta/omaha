# nginx configuration for the Omaha production stack.
#
# Sits in front of the `web` container (FastAPI on 127.0.0.1:8000
# inside its own container; the docker network resolves `web` to the
# container's internal IP). Terminates TLS on 443 and redirects
# plain-HTTP 80 to https.
#
# Bound into the nginx container by prod.yml as
# /etc/nginx/conf.d/default.conf:ro \u2014 the default.conf filename is
# the convention nginx uses to autoload server blocks at startup.

# Plain-HTTP \u2192 HTTPS redirect. Catches every request that arrives
# on 80 (browsers, old bookmarks, monitoring tools that ignore
# 301) and 301-redirects to the same URL on 443. $host + $request_uri
# preserves the original Host header and the full path so deep links
# work without per-vhost duplication.
server {
    listen 80;
    server_name _;

    # ACME http-01 challenges arrive on 80; do not redirect them.
    # If the operator runs certbot in a sidecar (recommended over an
    # in-nginx cert renewal), this location serves the challenge
    # file straight from the certs/ bind mount.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS virtual host. Listens on 443 with the operator-supplied
# fullchain + private key mounted from ./certs. Every request is
# proxied to the `web` container on the internal docker network.
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Modern TLS profile. Mozilla 'intermediate' as of 2026-Q1.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # OCSP stapling: ask the CA for the revocation status at startup
    # and serve it stapled to the certificate. Requires a reachable
    # resolver; the docker bridge DNS at 127.0.0.11 works.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 127.0.0.11 valid=300s;
    resolver_timeout 5s;

    # Long-lived static assets get a far-future Expires header so
    # the browser caches them aggressively. App.css lives at
    # /static/app.css.
    location /static/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        # $proxy_add_x_forwarded_for APPENDS to the existing
        # X-Forwarded-For header (so multi-hop chains survive) rather
        # than overwriting it.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # X-Forwarded-Proto https is the signal the FastAPI app's
        # https_only=True SessionMiddleware looks for to decide
        # whether to set the Secure flag on the session cookie.
        proxy_set_header X-Forwarded-Proto https;
        # WebSocket-friendly timeouts (the app does not currently
        # use WS, but the defaults are short and a slow client could
        # break a long-running POST).
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
