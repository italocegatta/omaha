<!-- asset-table-view 10.2/10.3 — dashboard-level add-asset modal.
     Overlay + panel with class select, name, and target_pct inputs.
     State lives in a global Alpine store ($store.addAssetModal) so
     the sidebar trigger button (in a different x-data scope) can open
     it without nesting. Uses the shared modal shell classes
     (.modal-overlay / .modal-panel / .modal-header / .modal-title /
     .modal-close / .modal-body / .modal-footer). -->
<div class="modal-overlay"
     x-data
     x-show="$store.addAssetModal.open"
     x-cloak
     x-transition.opacity.duration.200ms
     @click.self="$store.addAssetModal.closeModal()"
     data-testid="add-asset-modal-overlay">
  <div class="modal-panel modal-panel--add-asset" @click.stop>
    <div class="modal-header">
      <h2 class="modal-title">Novo ativo</h2>
      <button type="button"
              class="modal-close"
              data-testid="add-asset-modal-close"
              @click="$store.addAssetModal.closeModal()"><span class="icon icon--md" aria-hidden="true">close</span></button>
    </div>

    <div class="modal-body">
      <div class="add-asset-modal-field">
        <label for="add-asset-class">Classe</label>
        <select id="add-asset-class"
                class="add-asset-modal-input"
                data-testid="dashboard-add-asset-modal-class"
                x-init="$nextTick(() => { const cid = $store.addAssetModal.classId; if (cid) $el.value = cid; })"
                x-effect="(() => { const cid = $store.addAssetModal.classId; if (cid) $el.value = cid; })()"
                @change="$store.addAssetModal.classId = $event.target.value">
          <option value="">Selecione...</option>
          {% for c in class_aggregates %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="add-asset-modal-field">
        <label for="add-asset-name">Nome</label>
        <input type="text"
               id="add-asset-name"
               class="add-asset-modal-input"
               data-testid="dashboard-add-asset-name"
               x-model="$store.addAssetModal.name"
               placeholder="Ex: PETR4"
               :disabled="$store.addAssetModal.saving"
               @keyup.enter="$store.addAssetModal.submit()">
      </div>

      <div class="add-asset-modal-field">
        <label for="add-asset-target">Alvo % (dentro da classe)</label>
        <input type="number"
               id="add-asset-target"
               class="add-asset-modal-input"
               data-testid="dashboard-add-asset-target-pct"
               x-model="$store.addAssetModal.targetPct"
               step="0.01"
               min="0"
               max="100"
               placeholder="0"
               :disabled="$store.addAssetModal.saving"
               @keyup.enter="$store.addAssetModal.submit()">
      </div>
    </div>

    <div class="modal-footer">
      <button type="button"
              class="btn"
              data-testid="dashboard-add-asset-cancel"
              @click="$store.addAssetModal.closeModal()"
              :disabled="$store.addAssetModal.saving">Cancelar</button>
      <button type="button"
              class="btn btn-primary"
              data-testid="dashboard-add-asset-submit"
              @click="$store.addAssetModal.submit()"
              :disabled="$store.addAssetModal.saving">
        <span x-show="!$store.addAssetModal.saving">Salvar</span>
        <span x-show="$store.addAssetModal.saving">Salvando...</span>
      </button>
    </div>

    <p class="add-asset-modal-error"
       data-testid="dashboard-add-asset-error"
       x-show="$store.addAssetModal.error"
       x-text="$store.addAssetModal.error"
       x-cloak></p>
  </div>
</div>

<!-- dashboard-action-sidebar — new-class modal. Promotes the old
     inline newClassForm to a real modal sharing the shell.
     Posts JSON to /api/classes and reloads the page on 201 so the
     new class section renders with server-side aggregate data. -->
<div class="modal-overlay"
     x-data
     x-show="$store.newClassModal.open"
     x-cloak
     x-transition.opacity.duration.200ms
     @click.self="$store.newClassModal.closeModal()"
     data-testid="new-class-modal-overlay">
  <div class="modal-panel" @click.stop>
    <div class="modal-header">
      <h2 class="modal-title">Nova classe</h2>
      <button type="button"
              class="modal-close"
              data-testid="new-class-modal-close"
              @click="$store.newClassModal.closeModal()"><span class="icon icon--md" aria-hidden="true">close</span></button>
    </div>

    <div class="modal-body">
      <div class="add-asset-modal-field">
        <label for="new-class-modal-name">Nome</label>
        <input type="text"

               class="add-asset-modal-input"

               x-model="$store.newClassModal.name"
               placeholder="Ex: Renda Fixa"
               :disabled="$store.newClassModal.saving"
               @keyup.enter="$store.newClassModal.submit()">
      </div>
      <div class="add-asset-modal-field">
        <label for="new-class-modal-pct">Alvo %</label>

    <div class="modal-footer">
      <button type="button"
              class="btn"
              data-testid="new-class-modal-cancel"
              @click="$store.newClassModal.closeModal()"
              :disabled="$store.newClassModal.saving">Cancelar</button>
      <button type="button"
              class="btn btn-primary"
              data-testid="new-class-modal-submit"
              @click="$store.newClassModal.submit()"
              :disabled="$store.newClassModal.saving">
        <span x-show="!$store.newClassModal.saving">Salvar</span>
        <span x-show="$store.newClassModal.saving">Salvando...</span>
      </button>
    </div>

    <p class="add-asset-modal-error"
       data-testid="new-class-modal-error"
       x-show="$store.newClassModal.error"
       x-text="$store.newClassModal.error"
       x-cloak></p>
  </div>
</div>

<!-- S04/T03: Import modal overlay. Uses the shared modal shell
     (.modal-overlay / .modal-panel--wide for the review table that
     exceeds the default 480px cap / .modal-header / .modal-title /
     .modal-close). Body content stays bespoke (file picker, review
     table, etc.). -->
<div class="modal-overlay"
     x-data
     x-show="$store.importModal.open"
     x-cloak
     x-transition.opacity.duration.200ms
     @click.self="$store.importModal.closeModal()"
     data-testid="import-modal-overlay">
  <div class="modal-panel modal-panel--wide" @click.stop>
    <div class="modal-header">
      <h2 class="modal-title">Importar posições</h2>
      <button type="button"
              class="modal-close"
              data-testid="import-modal-close"
              @click="$store.importModal.closeModal()"><span class="icon icon--md" aria-hidden="true">close</span></button>
    </div>

    <!-- Step 1: File upload -->
    <div class="import-modal-step import-modal-step--upload"
         x-show="$store.importModal.step === 1"
         x-transition:enter.duration.200ms>
      <div class="import-modal-upload-area">
        <p class="import-modal-upload-hint">
          Selecione um arquivo CSV com as posições do seu corretor
        </p>
        <input type="file"
                accept=".csv"
                data-testid="import-file-input"
                @change="$store.importModal.selectFile($event.target.files[0], $event.target)"
               :disabled="$store.importModal.uploading">
        <p class="import-modal-upload-status"
           x-show="$store.importModal.uploading"
           x-cloak>Enviando arquivo...</p>
      </div>
      <p class="import-modal-error"
         x-show="$store.importModal.step1Error"
         x-text="$store.importModal.step1Error"
         x-cloak
         data-testid="import-upload-error"></p>
    </div>

    <!-- Step 2: Review + commit -->
    <div class="import-modal-step"
         x-show="$store.importModal.step === 2"
         x-transition:enter.duration.200ms>

      <!-- Expired preview -->
      <div class="import-expired-message"
           x-show="$store.importModal.previewError"
           data-testid="import-expired-message">
        <p>Sessão expirada. Reenvie o arquivo.</p>
        <button type="button"
                class="import-btn import-btn-primary"
                @click="$store.importModal.goBackToStep1()">
          Reenviar
        </button>
      </div>

      <template x-if="!$store.importModal.previewError">
        <div>
          <!-- Existing assets (auto-matched) -->
          <div class="import-review-section import-review-section--existing" x-show="$store.importModal.autoMatched.length > 0">
            <h3>Ativos existentes na carteira</h3>
            <table class="import-review-table" data-testid="import-existing-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Qtde</th>
                  <th>Preço médio</th>
                  <th>Total atual</th>
                  <th>Classe</th>
                  {# asset-trade-flags: per-asset trade-control columns.
                     Auto-matched rows show the current ``Asset`` values
                     (preserved across re-imports); unmatched rows show
                     the project defaults (``True / True / BRL``). The
                     operator can flip each toggle before commit. #}
                  <th>Compra</th>
                  <th>Venda</th>
                  <th>Moeda</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="(row, i) in $store.importModal.autoMatched" :key="row.broker_ticker">
                  <tr data-testid="import-existing-row"
                      x-data="{
                        cellColor: 'transparent',
                        getClassIndex(color) {
                          if (!color || color === 'transparent') return -1;
                          var list = Alpine.store('importModal').assetClasses;
                          for (var i = 0; i < list.length; i++) {
                            if (list[i].color === color) return i;
                          }
                          return -1;
                        }
                      }">
                    <td x-text="row.name"></td>
                    <td x-text="row.qty"></td>
                    <td>R$ <span x-text="$store.importModal.formatBRL(row.avg_price, 0)"></span></td>
                    <td>R$ <span x-text="$store.importModal.formatBRL(row.current_value, 0)"></span></td>
                    <td class="import-class-cell"
                        :class="cellColor === 'transparent' ? 'import-class-cell--pending' : 'import-class-cell--cls-' + getClassIndex(cellColor)"
                        data-testid="import-class-cell-existing">
                      <span class="class-color-swatch import-class-swatch"
                            :style="`background: ${cellColor}`"
                            x-init="cellColor = $store.importModal.getClassColor(($store.importModal.assignments[row.broker_ticker] || {}).class_id)"
                            x-effect="cellColor = $store.importModal.getClassColor(($store.importModal.assignments[row.broker_ticker] || {}).class_id)"></span>
                      <select :style="cellColor === 'transparent' ? '' : `background: color-mix(in srgb, ${cellColor} 30%, white); border-color: ${cellColor}; color: #111827`"
                              x-init="$nextTick(() => { const a = $store.importModal.assignments[row.broker_ticker]; if (a) $el.value = a.class_id ?? ''; })"
                              x-effect="(() => { const a = $store.importModal.assignments[row.broker_ticker]; if (a) $el.value = a.class_id ?? ''; })()"
                              @change="$store.importModal.assignments[row.broker_ticker].class_id = $event.target.value"
                              data-testid="import-existing-class">
                        <option value="">Selecione...</option>
                        <template x-for="ac in $store.importModal.assetClasses" :key="ac.id">
                          <option :value="ac.id" x-text="ac.name"></option>
                        </template>
                      </select>
                    </td>
                    <td data-testid="import-existing-buy">
                      <label class="import-trade-toggle">
                        <input type="checkbox"
                               data-testid="import-existing-buy-toggle"
                               :checked="$store.importModal.assignments[row.broker_ticker] ? $store.importModal.assignments[row.broker_ticker].buy_enabled : true"
                               @change="$store.importModal.setBuy(row.broker_ticker, $event.target.checked)">
                        <span>Compra</span>
                      </label>
                    </td>
                    <td data-testid="import-existing-sell">
                      <label class="import-trade-toggle">
                        <input type="checkbox"
                               data-testid="import-existing-sell-toggle"
                               :checked="$store.importModal.assignments[row.broker_ticker] ? $store.importModal.assignments[row.broker_ticker].sell_enabled : true"
                               @change="$store.importModal.setSell(row.broker_ticker, $event.target.checked)">
                        <span>Venda</span>
                      </label>
                    </td>
                    <td data-testid="import-existing-currency">
                      <select class="import-currency-select"
                              x-init="$nextTick(() => { const a = $store.importModal.assignments[row.broker_ticker]; if (a) $el.value = a.currency_code ?? 'BRL'; })"
                              x-effect="(() => { const a = $store.importModal.assignments[row.broker_ticker]; if (a) $el.value = a.currency_code ?? 'BRL'; })()"
                              @change="$store.importModal.setCurrency(row.broker_ticker, $event.target.value)"
                              data-testid="import-existing-currency-select">
                        <option value="BRL">BRL</option>
                        <option value="USD">USD</option>
                      </select>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>

          <!-- New assets (unmatched) -->
          <div class="import-review-section import-review-section--new" x-show="$store.importModal.unmatched.length > 0">
            <h3>Novos ativos</h3>
            <table class="import-review-table" data-testid="import-unmatched-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Qtde</th>
                  <th>Preço médio</th>
                  <th>Total atual</th>
                  <th>Classe</th>
                  <th>Compra</th>
                  <th>Venda</th>
                  <th>Moeda</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="(row, i) in $store.importModal.unmatched" :key="row.broker_ticker">
                  <tr data-testid="import-unmatched-row"
                      x-data="{
                        cellColor: 'transparent',
                        getClassIndex(color) {
                          if (!color || color === 'transparent') return -1;
                          var list = Alpine.store('importModal').assetClasses;
                          for (var i = 0; i < list.length; i++) {
                            if (list[i].color === color) return i;
                          }
                          return -1;
                        }
                      }">
                    <td x-text="row.name"></td>
                    <td x-text="row.qty"></td>
                    <td>R$ <span x-text="$store.importModal.formatBRL(row.avg_price, 0)"></span></td>
                    <td>R$ <span x-text="$store.importModal.formatBRL(row.current_value, 0)"></span></td>
                    <td class="import-class-cell"
                        :class="cellColor === 'transparent' ? 'import-class-cell--pending' : 'import-class-cell--cls-' + getClassIndex(cellColor)"
                        data-testid="import-class-cell-assignment">
                      <span class="class-color-swatch import-class-swatch"
                            :style="`background: ${cellColor}`"
                            x-init="cellColor = $store.importModal.getClassColor(($store.importModal.assignments[row.broker_ticker] || {}).class_id)"
                            x-effect="cellColor = $store.importModal.getClassColor(($store.importModal.assignments[row.broker_ticker] || {}).class_id)"></span>
                      <select :style="cellColor === 'transparent' ? '' : `background: color-mix(in srgb, ${cellColor} 30%, white); border-color: ${cellColor}; color: #111827`"
                              x-init="$nextTick(() => { const a = $store.importModal.assignments[row.broker_ticker]; if (a) $el.value = a.class_id ?? ''; })"
                              x-effect="(() => { const a = $store.importModal.assignments[row.broker_ticker]; if (a) $el.value = a.class_id ?? ''; })()"
                              @change="$store.importModal.assignments[row.broker_ticker].class_id = $event.target.value"
                              data-testid="import-assignment-class">
                        <option value="">Selecione...</option>
                        <template x-for="ac in $store.importModal.assetClasses" :key="ac.id">
                          <option :value="ac.id" x-text="ac.name"></option>
                        </template>
                      </select>
                    </td>
                    <td data-testid="import-unmatched-buy">
                      <label class="import-trade-toggle">
                        <input type="checkbox"
                               data-testid="import-unmatched-buy-toggle"
                               :checked="$store.importModal.assignments[row.broker_ticker] ? $store.importModal.assignments[row.broker_ticker].buy_enabled : true"
                               @change="$store.importModal.setBuy(row.broker_ticker, $event.target.checked)">
                        <span>Compra</span>
                      </label>
                    </td>
                    <td data-testid="import-unmatched-sell">
                      <label class="import-trade-toggle">
                        <input type="checkbox"
                               data-testid="import-unmatched-sell-toggle"
                               :checked="$store.importModal.assignments[row.broker_ticker] ? $store.importModal.assignments[row.broker_ticker].sell_enabled : true"
                               @change="$store.importModal.setSell(row.broker_ticker, $event.target.checked)">
                        <span>Venda</span>
                      </label>
                    </td>
                    <td data-testid="import-unmatched-currency">
                      <select class="import-currency-select"
                              x-init="$nextTick(() => { const a = $store.importModal.assignments[row.broker_ticker]; if (a) $el.value = a.currency_code ?? 'BRL'; })"
                              x-effect="(() => { const a = $store.importModal.assignments[row.broker_ticker]; if (a) $el.value = a.currency_code ?? 'BRL'; })()"
                              @change="$store.importModal.setCurrency(row.broker_ticker, $event.target.value)"
                              data-testid="import-unmatched-currency-select">
                        <option value="BRL">BRL</option>
                        <option value="USD">USD</option>
                      </select>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>

          <!-- Commit error -->
          <p class="import-modal-error"
             x-show="$store.importModal.error"
             x-text="$store.importModal.error"
             x-cloak
             data-testid="import-commit-error"></p>

          <!-- Actions -->
          <div class="import-modal-actions">
            <button type="button"
                    class="import-btn"
                    @click="$store.importModal.closeModal()">Cancelar</button>
            <button type="button"
                    class="import-btn import-btn-primary"
                    data-testid="import-commit-btn"
                    @click="$store.importModal.commit()"
                    :disabled="$store.importModal.committing">
              <span x-show="!$store.importModal.committing">Confirmar</span>
              <span x-show="$store.importModal.committing">Salvando...</span>
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

<script>
  // asset-table-view 10.x: class list for the dashboard-level add-asset
  // modal. The modal options are rendered by Alpine via <template x-for>,
  // so the source list is injected here as a plain JS array.
  window.__assetClasses = [{% for c in class_aggregates %}{id: {{ c.id }}, name: {{ c.name | tojson }}}{% if not loop.last %},{% endif %}{% endfor %}];

  // fix-asset-table-ui-bugs: sort comparator factory. Returns a
  // function that compares two assets by ``key`` in ``dir``
  // direction. Shared between ``classSection.init()`` (initial
  // ``displayAssets`` build) and ``classSection.sortBy()``
  // (user-driven resort). Extracted so the two call sites stay
  // byte-for-byte identical — a drift here would be a silent
  // bug (different initial vs user-click order).
  function sortValue(asset, key) {
    switch (key) {
      case 'name':
        return String(asset.name || '');
      case 'qty':
        return asset.qty || 0;
      case 'avg-price':
        return asset.avg_price;
      case 'gain':
        return asset.gain_value;
      case 'position':
        return asset.current_value;
      case 'position-deviation':
        return asset.position_deviation_value;
      case 'class-current':
        return asset.current_pct_class;
      case 'class-target':
        return asset.target_pct;
      case 'class-deviation':
        return asset.class_deviation_pct;
      case 'portfolio-current':
        return asset.current_pct_total;
      case 'portfolio-target':
        return asset.target_pct_total;
      case 'portfolio-deviation':
        return asset.portfolio_deviation_pct;
      case 'buy':
        return asset.buy_enabled ? 1 : 0;
      case 'sell':
        return asset.sell_enabled ? 1 : 0;
      case 'currency':
        return String(asset.currency_code || '');
      default:
        return null;
    }
  }

  function sortFn(key, dir) {
    return function (a, b) {
      var av = sortValue(a, key);
      var bv = sortValue(b, key);
      var cmp = 0;
      if (key === 'name' || key === 'currency') {
        cmp = String(av || '').localeCompare(String(bv || ''));
      } else {
        var aMissing = av === null || av === undefined;
        var bMissing = bv === null || bv === undefined;
        if (aMissing && bMissing) {
          cmp = 0;
        } else if (aMissing) {
          cmp = 1;
        } else if (bMissing) {
          cmp = -1;
        } else {
          cmp = av - bv;
        }
      }
      if (cmp === 0) {
        cmp = String(a.name || '').localeCompare(String(b.name || ''));
      }
      return dir === 'asc' ? cmp : -cmp;
    };
  }

  // Alpine.js component for the per-class section: 4-percentage
  // view + inline editor for the asset ``target_pct_class`` column.
  //
  // The component owns the class's "live preview" of the per-class
  // sum so the operator can see "Sobra/Falta X%" as they type,
  // matching the server-side validator's wording byte-for-byte
  // (the validator lives in ``omaha.validators`` and is the
  // single source of truth — see T01-SUMMARY and T02-SUMMARY).
  function classSection(initial) {
    return {
      classId: initial.id,
      className: initial.name,
      classTargetPct: initial.target_pct,
      classColor: initial.color,
      classCurrentPct: initial.current_pct,
      classCurrentValue: initial.current_value,
      classInvested: initial.invested,
      classGainValue: initial.gain_value,
      classGainPct: initial.gain_pct,
      initialPortfolioTargetPct: initial.portfolio_target_pct,
      initialPortfolioDeviationPct: initial.portfolio_deviation_pct,

      // F01: read-only mode flag for the household aggregate view.
      // When true, every mutation affordance (delete buttons, inline
      // pct edits, trade toggles) is gated so a click does nothing —
      // the API would also reject the request with 409, but the UI
      // never gets there because the buttons don't fire. The flag
      // is set once from the server-rendered class_data blob.
      readOnly: initial.read_only === true,

      init: function () {
        this.displayAssets = this.assets.slice();
        this._initFilterBounds();
        if (Alpine.store('classSum') && this.classTargetPct !== null && this.classTargetPct !== undefined) {
          var store = Alpine.store('classSum');
          store.register(this.classId, this.classTargetPct);
          store.setClassSum(this.classId, this.classSum, this.className);
        }
      },
      assets: initial.assets.map(function (a) {
        return {
          id: a.id,
          name: a.name,
          class_name: a.class_name,
          target_pct: a.target_pct,
          qty: a.qty,
          avg_price: a.avg_price,
          gain_value: a.gain_value,
          gain_pct: a.gain_pct,
          current_pct_class: a.current_pct_class,
          class_deviation_pct: a.class_deviation_pct,
          current_pct_total: a.current_pct_total,
          target_pct_total: a.target_pct_total,
          portfolio_deviation_pct: a.portfolio_deviation_pct,
          position_count: a.position_count,
          current_value: a.current_value,
          position_deviation_value: a.position_deviation_value,
          // asset-trade-flags: per-asset trade-control state copied
          // from the server-rendered ``class_data.assets`` dict. The
          // toggle UI mutates these in place after a successful
          // PATCH (``toggleTradeFlag`` below) so the row's visual
          // state reflects the server truth without a page reload.

            // Update the class-level allocation sum store so the
            // Distribution header reflects the new total reactively.
            // 3.3: also push the per-class asset-sum so the sticky
            // alert card's per-class entry stays in sync — class PATCH
            // recomputes target_pct_total for every asset, which can
            // change the per-class delta even when the per-asset
            // target_pcts didn't move (the class anchor changed).
            if (Alpine.store('classSum')) {
              var store = Alpine.store('classSum');
              store.update(self.classId, self.classTargetPct);
              store.setClassSum(self.classId, self.classSum, self.className);
            }
            // Recompute each asset's target_pct_total in the local
            // model so the dashboard reflects the new class-level
            // allocation without a page reload.
            for (var i = 0; i < self.assets.length; i++) {
              var a = self.assets[i];
              a.target_pct_total = (a.target_pct * self.classTargetPct) / 100;
            }
            self.editingClassPct = false;
            self.editClassPctValue = '';
            self.editClassPctError = '';
          })
          .catch(function (err) {
            self.editClassPctError = err && err.message ? err.message : 'Erro ao salvar';
          })
          .then(function () {
            self.savingClassPct = false;
          });
      },

      startEdit: function (id) {
        if (this.editingTotalAssetId !== null) {
          this.cancelEditTotal();
        }
        var asset = this.displayAssets.find(function (a) { return a.id === id; });
        if (!asset) return;
        this.editingAssetId = id;
        this.editingValue = String(asset.target_pct);
        this.error = '';
        // Scope the input lookup to the row whose asset id matches
        // ``id`` — ``x-ref="assetClassPctInput"`` collides across
        // rows in the same classSection Alpine scope, so
        // ``this.$refs.assetClassPctInput`` resolves to the LAST
        // matching input registered, which may be in a different
        // row. Use a per-row data attribute selector instead.
        var self = this;
        requestAnimationFrame(function () {
          var el = document.querySelector(
            '.asset-inline-edit-input[data-asset-id="' + id + '"]:not([data-testid*="total"])'
          );
          if (!el) return;
          el.focus();
          requestAnimationFrame(function () {
            el.select();
          });
        });
      },
      startEditTotal: function (id) {
        if (this.editingAssetId !== null) {
          this.cancelEdit();
        }
        var asset = this.displayAssets.find(function (a) { return a.id === id; });
        if (!asset) return;
        this.editingTotalAssetId = id;
        this.editingTotalValue = String(asset.target_pct_total);
        this.errorTotal = '';
        var self = this;
        requestAnimationFrame(function () {
          var el = document.querySelector(
            '[data-testid="asset-target-pct-total-edit-input"][data-asset-id="' + id + '"]'
          );
          if (!el) return;
          el.focus();
          requestAnimationFrame(function () {
            el.select();
          });
        });
      },
      cancelEditTotal: function () {
        this.editingTotalAssetId = null;
        this.editingTotalValue = '';
        this.errorTotal = '';
      },
      cancelEdit: function () {
        this.editingAssetId = null;
        this.editingValue = '';
        this.error = '';
      },
      commitEdit: function () {
        if (this.editingAssetId === null) return;
        var id = this.editingAssetId;
        var self = this;
        var pct = (self.editingValue ?? '').toString().trim();
        if (pct === '') pct = '0';
        self.saving = true;
        self.error = '';
        fetch('/api/assets/' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target_pct: pct }),
        })
          .then(function (r) {
            if (r.status === 200) {
              return r.json();
            }
            // 422 → validator rejection. Body shape:
            // ``{"detail": "<Sobra/Falta X%>"}``.
            return r.json().then(function (body) {
              var detail = (body && body.detail) ? body.detail : 'Erro ao salvar';
              throw new Error(detail);
            });
          })
          .then(function (payload) {
            self.isOpen = true;
            // Update the local row's target_pct and recompute
            // target_pct_total in-place so the user sees the
            // change immediately without a page reload.
            // fix-asset-table-ui-bugs: mutate ``displayAssets``
            // (the snapshot the table iterates) so the row order
            // stays frozen. ``assets`` shares the same object
            // references, so ``classSum`` keeps reading the
            // post-PATCH value through ``assets``.
            var parsed = parseFloat(payload.target_pct);
            var parsedTotal = parseFloat(payload.target_pct_total);
            var asset = self.displayAssets.find(function (a) { return a.id === id; });
            if (asset) {
              asset.target_pct = isNaN(parsed) ? asset.target_pct : parsed;
              asset.target_pct_total = isNaN(parsedTotal)
                ? asset.target_pct_total
                : parsedTotal;
            }
            // 3.3: push the new per-class sum to the store on every
            // successful asset PATCH so the per-class badge and the
            // portfolio sticky alert card stay reactive without a
            // page reload. ``update()`` on the class pct is a no-op
            // here (asset PATCH doesn't move the class anchor) but
            // it's part of the 3.3 contract — the store sees the
            // post-PATCH class state on every write.
            if (Alpine.store('classSum')) {
              var store = Alpine.store('classSum');
              store.update(self.classId, self.classTargetPct);
              store.setClassSum(self.classId, self.classSum, self.className);
            }
            self.editingAssetId = null;
            self.editingValue = '';
            self.error = '';
          })
          .catch(function (err) {
            self.error = err && err.message ? err.message : 'Erro ao salvar';
          })
          .then(function () {
            self.saving = false;
          });
      },

      // asset-table-view 7.1/7.2 + F17: inline edit of ``alvo % total``.
      // Browser sends operator's typed global percentage unchanged;
      // server converts it into canonical ``target_pct`` and returns
      // the confirmed canonical + derived state.
      commitEditTotal: function () {
        if (this.editingTotalAssetId === null) return;
        var self = this;
        var totalStr = (self.editingTotalValue ?? '').toString().trim();
        if (totalStr === '') totalStr = '0';
        var id = self.editingTotalAssetId;
        self.savingTotal = true;
        self.errorTotal = '';
        fetch('/api/assets/' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target_pct_total: totalStr }),
        })
          .then(function (r) {
            if (r.status === 200) {
              return r.json();
            }
            return r.json().then(function (body) {
              var detail = (body && body.detail) ? body.detail : 'Erro ao salvar';
              throw new Error(detail);
            });
          })
          .then(function (payload) {
            self.isOpen = true;
            // fix-asset-table-ui-bugs: mutate ``displayAssets`` so
            // the row order stays frozen after the PATCH (see
            // ``commitEdit`` for the same pattern + reasoning).
            var parsedPct = parseFloat(payload.target_pct);
            var parsedTotal = parseFloat(payload.target_pct_total);
            var asset = self.displayAssets.find(function (a) { return a.id === id; });
            if (asset) {
              asset.target_pct = isNaN(parsedPct) ? asset.target_pct : parsedPct;
              asset.target_pct_total = isNaN(parsedTotal)
                ? asset.target_pct_total
                : parsedTotal;
            }
            if (Alpine.store('classSum')) {
              var store = Alpine.store('classSum');
              store.update(self.classId, self.classTargetPct);
              store.setClassSum(self.classId, self.classSum, self.className);
            }
            self.editingTotalAssetId = null;
            self.editingTotalValue = '';
            self.errorTotal = '';
          })
          .catch(function (err) {
            self.errorTotal = err && err.message ? err.message : 'Erro ao salvar';
          })
          .then(function () {
            self.savingTotal = false;
          });
      },

      // ── Delete class ──────────────────────────────────────────
      //
      // Shows confirm dialog; on confirm, DELETE /api/classes/{id}.
      // 204 → page reload (class removed server-side).
      // 409 → display server error (class has assets).
      // Other errors → generic message.

      confirmDelete: function () {
        var self = this;
        self.deleting = true;
        self.deleteError = '';
        fetch('/api/classes/' + self.classId, {
          method: 'DELETE',
        })
          .then(function (r) {
            if (r.status === 204) {
              // Success — reload the page so the class section is removed
              // and server-side aggregates re-render.
              window.location.reload();
              return;
            }
            // 409 (class has assets) or other error. Body shape:
            // {"detail": "Classe tem N ativo(s); remova-os antes."}
            return r.json().then(function (body) {
              var detail = (body && body.detail) ? body.detail : 'Erro ao remover classe';
              throw new Error(detail);
            });
          })
          .catch(function (err) {
            self.deleteError = err && err.message ? err.message : 'Erro ao remover classe';
          })
          .then(function () {
            self.deleting = false;
          });
      },

      cancelDelete: function () {
        this.showDeleteConfirm = false;
        this.deleteError = '';
        this.deleting = false;
      },

      // ── Inline create asset (S03/T03) ───────────────────────
      //
      // POSTs JSON {name, target_pct} to /api/assets. The T01
      // server-side validator is the single source of truth for
      // per-class sum validation, duplicate-name 409, and
      // cross-profile class id 422 — this UI just renders the
      // server's ``detail`` message verbatim on 4xx. On 201 we
      // reload so the new asset row renders with server-side
      // aggregate data (current_value, percentages, etc.).

      addAsset: function () {
        var self = this;
        self.addingAsset = true;
        self.addAssetError = '';
        fetch('/api/assets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: self.newAssetName,
            asset_class_id: self.classId,
            target_pct: self.newAssetTargetPct,
          }),
        })
          .then(function (r) {
            if (r.status === 201) {
              // Reload the page so the new asset row renders with
              // server-side aggregate data (display_order, current
              // value, percentages).
              window.location.reload();
              return;
            }
            // 409 (duplicate name) or 422 (validation error). Body
            // shape: {"detail": "<message>"}.
            return r.json().then(function (body) {
              var detail = (body && body.detail) ? body.detail : 'Erro ao criar ativo';
              throw new Error(detail);
            });
          })
          .catch(function (err) {
            self.addAssetError = err && err.message ? err.message : 'Erro ao criar ativo';
          })
          .then(function () {
            self.addingAsset = false;
          });
      },

      cancelAddAsset: function () {
        this.showAddAsset = false;
        this.newAssetName = '';
        this.newAssetTargetPct = '';
        this.addAssetError = '';
        this.addingAsset = false;
      },

      // ── Per-asset delete confirm (S03/T04) ─────────────────
      //
      // The × button per asset row calls askDeleteAsset(id, name)
      // which sets showDeleteAssetId; the matching row's confirm
      // dialog appears (x-show="showDeleteAssetId === id"). Only
      // one row per class section can be in confirm state at a
      // time because showDeleteAssetId is a single value.
      //
      // confirmDeleteAsset() DELETEs /api/assets/{showDeleteAssetId}.
      // 204 → page reload (asset + cascading positions removed).
      // 404 → server returns {"detail": "Ativo não encontrado."};
      // surfaced verbatim. There is no 409 — positions cascade.
      askDeleteAsset: function (id, name) {
        this.showDeleteAssetId = id;
        this.deletingAssetName = name;
        this.deleteAssetError = '';
      },

      confirmDeleteAsset: function () {
        if (this.showDeleteAssetId === null) return;
        var id = this.showDeleteAssetId;
        var self = this;
        self.deletingAssetId = id;
        self.deleteAssetError = '';
        fetch('/api/assets/' + id, {
          method: 'DELETE',
        })
          .then(function (r) {
            if (r.status === 204) {
              // Success — reload the page so the asset row (and its
              // cascading positions) is removed and server-side
              // aggregates re-render.
              window.location.reload();
              return;
            }
            // 404 or other 4xx. Body shape: {"detail": "..."}.
            return r.json().then(function (body) {
              var detail = (body && body.detail) ? body.detail : 'Erro ao remover ativo';
              throw new Error(detail);
            });
          })
          .catch(function (err) {
            self.deleteAssetError = err && err.message ? err.message : 'Erro ao remover ativo';
          })
          .then(function () {
            self.deletingAssetId = null;
          });
      },

      cancelDeleteAsset: function () {
        this.showDeleteAssetId = null;
        this.deletingAssetId = null;
        this.deleteAssetError = '';
        this.deletingAssetName = '';
      },

      // asset-trade-flags: flip a single trade-control field on an
      // asset row and PATCH ``/api/assets/{id}`` with just that field.
      // Visual state updates AFTER the server returns 200 so the UI
      // never drifts from the source of truth. ``savingTrade``
      // carries the {assetId, field} pair so only the toggle the
      // operator actually clicked is disabled while the PATCH is in
      // flight — the sibling toggle (and the currency badge) on the
      // same row stay clickable / visually untouched.
      toggleTradeFlag: function (assetId, field, value) {
        var self = this;
        if (self.savingTrade !== null) return; // another toggle in flight
        self.savingTrade = { assetId: assetId, field: field };
        self.tradeError = '';
        var body = {};
        body[field] = value;
        fetch('/api/assets/' + assetId, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        })
          .then(function (r) {
            if (r.status === 200) return r.json();
            return r.json().then(function (j) {
              var detail = (j && j.detail) ? j.detail : 'Erro ao salvar';
              throw new Error(detail);
            });
          })
          .then(function (payload) {
            var asset = self.displayAssets.find(function (a) { return a.id === assetId; });
            if (asset) {
              asset.buy_enabled = payload.buy_enabled;
              asset.sell_enabled = payload.sell_enabled;
              asset.currency_code = payload.currency_code;
            }
          })
          .catch(function (err) {
            self.tradeError = err && err.message ? err.message : 'Erro ao salvar';
          })
          .then(function () {
            self.savingTrade = null;
          });
      },
    };
  }

  // S04/T03: Global Alpine store for the import modal. A store
  // (not a component function) so the trigger button in the
  // dashboard-actions div (which has no x-data of its own) can
  // open it via $store.importModal.openModal().
  document.addEventListener('alpine:init', function () {
    // S02/D006 + asset-table-view 3.1/3.2/3.3: Class-level allocation
    // sum tracker. Shows "Falta X%" / "Sobra X%" for the total of all
    // class target_pcts AND, per the asset-table-view extension, the
    // per-class asset-sum deviation in ``classDeltas[id] = {delta,
    // message, severity}``. The asset-table-view spec uses both
    // severities (per-class badge + portfolio sticky card) and reads
    // them from this single store so the dashboard reacts without a
    // page reload.
    //
    // API
    // ---
    // * ``register(id, pct)`` / ``update(id, pct)`` — the original
    //   per-class ``target_pct`` setter (portfolio-level sum).
    // * ``setClassSum(id, assetSum, name)`` — new in 3.1, extended
    //   by 9.x: pushes the per-class sum of asset ``target_pct``s and
    //   writes the ``{delta, message, severity, name}`` record into
    //   ``classDeltas[id]``. The task text only names
    //   ``register/update/_recalc``; ``setClassSum`` is the missing
    //   push API that lets the ``classSection`` component feed the
    //   per-class deviation in (the store has no other channel — the
    //   assets live inside ``classSection``).
    // * ``severityForDelta(delta)`` — new in 3.2: pure helper, exported
    //   on the store, 2-tier table ``<=0.01 ok``, ``>0.01 danger``
    //   (warn tier removed in F37).
    // * ``_recalc()`` — now recomputes both the portfolio total /
    //   delta / message / severity, in one pass.
    //
    // The store never blocks creation or editing (informational only).
    // Each ``classSection`` registers via ``register()`` on init and
    // calls ``update()`` + ``setClassSum()`` after a successful PATCH
    // so the display is reactive without page reloads.
    Alpine.store('classSum', {
      items: {},
      totalPct: 0,
      delta: 0,
      message: '',
      severity: 'ok',
      classDeltas: {},
      register: function (id, pct) {
        this.items[id] = pct;
        this._recalc();
      },
      update: function (id, pct) {
        this.items[id] = pct;
        this._recalc();
      },
      // 3.1 / 9.x — push the per-class asset ``target_pct`` sum into
      // the store. The store has no other channel for this data (the
      // assets live inside ``classSection``), so the component must
      // call this explicitly on init + after every PATCH. ``name``
      // is stored so the sticky alert card can render the class label.
      setClassSum: function (id, assetSum, name) {
        var sum = parseFloat(assetSum) || 0;
        var delta = Math.round((100 - sum) * 100) / 100;
        var message = 'OK';
        if (Math.abs(delta) > 0.01) {
          if (delta < 0) {
            message = 'Sobra ' + Math.round(-delta) + '%';
          } else {
            message = 'Falta ' + Math.round(delta) + '%';
          }
        }
        this.classDeltas[id] = {
          delta: delta,
          message: message,
          severity: this.severityForDelta(delta),
          name: name || '',
        };
        this._recalc();
      },
      // 9.x — list of classDeltas entries whose absolute deviation
      // exceeds the tolerance. Used by the sticky alert card to render
      // only the deviating classes and to decide card visibility.
      get deviatingClasses() {
        var list = [];
        for (var k in this.classDeltas) {
          if (this.classDeltas.hasOwnProperty(k)) {
            var cd = this.classDeltas[k];
            if (Math.abs(cd.delta) > 0.01) {
              list.push(cd);
            }
          }
        }
        return list;
      },
      // 3.2 — pure severity helper. ``<=0.01`` → ok, else danger.
      // Exported on the store so the per-class badge and the
      // portfolio sticky card reuse the same 2-tier table (single
      // source of truth). Intermediate warn tier removed (F37).
      severityForDelta: function (delta) {
        var abs = Math.abs(delta);
        if (abs <= 0.01) return 'ok';
        return 'danger';
      },
      _recalc: function () {
        var sum = 0;
        for (var k in this.items) {
          if (this.items.hasOwnProperty(k)) {
            sum += parseFloat(this.items[k]) || 0;
          }
        }
        this.totalPct = Math.round(sum * 100) / 100;
        var d = Math.round((100 - this.totalPct) * 100) / 100;
        if (Math.abs(d) <= 0.01) {
          this.delta = 0;
          this.message = '';
        } else if (d < 0) {
          this.delta = d;
          this.message = 'Sobra ' + Math.round(-d) + '%';
        } else {
          this.delta = d;
          this.message = 'Falta ' + Math.round(d) + '%';
        }
        // 3.1/3.2 — derive the portfolio-level severity from the
        // same delta so the sticky alert card can read it as
        // ``$store.classSum.severity`` (no second helper needed).
        this.severity = this.severityForDelta(d);
      },
    });

    Alpine.store('importModal', {
      open: false,
      step: 1,
      file: null,
      previewId: null,
      autoMatched: [],
      unmatched: [],
      assetClasses: [],
      uploading: false,
      committing: false,
      error: '',
      step1Error: '',
      previewError: false,
      assignments: {},
      previewRequest: 0,

      getAssetName: function (ticker) {
        var a = this.assignments[ticker];
        return a ? a.asset_name : '';
      },
      setAssetName: function (ticker, val) {
        if (!this.assignments[ticker]) this.assignments[ticker] = { class_id: '', asset_name: '', buy_enabled: true, sell_enabled: true, currency_code: 'BRL' };
        this.assignments[ticker].asset_name = val;
        this.assignments = Object.assign({}, this.assignments);
      },
      // asset-trade-flags: setters for the per-row trade-control
      // fields exposed in the import modal review. Each one
      // upserts the assignment object (the row may not exist
      // yet if the user flipped a toggle before picking a class)
      // and reassigns ``assignments`` so Alpine picks up the
      // change reactively.
      setBuy: function (ticker, value) {
        if (!this.assignments[ticker]) this.assignments[ticker] = { class_id: '', asset_name: '', buy_enabled: true, sell_enabled: true, currency_code: 'BRL' };
        this.assignments[ticker].buy_enabled = !!value;
        this.assignments = Object.assign({}, this.assignments);
      },
      setSell: function (ticker, value) {
        if (!this.assignments[ticker]) this.assignments[ticker] = { class_id: '', asset_name: '', buy_enabled: true, sell_enabled: true, currency_code: 'BRL' };
        this.assignments[ticker].sell_enabled = !!value;
        this.assignments = Object.assign({}, this.assignments);
      },
      setCurrency: function (ticker, value) {
        if (!this.assignments[ticker]) this.assignments[ticker] = { class_id: '', asset_name: '', buy_enabled: true, sell_enabled: true, currency_code: 'BRL' };
        // The server's allowlist is {BRL, USD}; anything else
        // is rejected at commit. Clamp defensively so the local
        // state never holds a value the server would reject.
        var v = String(value || '').toUpperCase();
        if (v !== 'BRL' && v !== 'USD') v = 'BRL';
        this.assignments[ticker].currency_code = v;
        this.assignments = Object.assign({}, this.assignments);
      },

      formatBRL: function (v, decimals) {
        var f = window.__tableFormatters;
        if (f) return f.formatBRL(v, decimals);
        var n = Number(v) || 0;
        var d = (decimals === undefined || decimals === null) ? 0 : decimals;
        return n.toLocaleString('pt-BR', { minimumFractionDigits: d, maximumFractionDigits: d });
      },
      getClassColor: function (classId) {
        if (!classId) return 'transparent';
        var c = this.assetClasses.find(function (a) { return String(a.id) === String(classId); });
        return c ? c.color : 'transparent';
      },

      openModal: function () {
        this.resetState();
        this.open = true;
      },

      closeModal: function () {
        this.open = false;
        this.resetState();
      },

      resetState: function () {
        this.step = 1;
        this.file = null;
        this.clearPreview();
        this.uploading = false;
        this.committing = false;
        this.error = '';
        this.step1Error = '';
      },

      clearPreview: function () {
        // Invalidate any in-flight preview before clearing its state. A late
        // response must never replace a newer file selection or closed modal.
        this.previewRequest += 1;
        this.previewId = null;
        this.autoMatched = [];
        this.unmatched = [];
        this.assetClasses = [];
        this.assignments = {};
        this.previewError = false;
      },

      selectFile: function (file, input) {
        this.file = file || null;
        // Clear native selection after retaining File reference so choosing
        // same file again fires change after preview failure.
        if (input) input.value = '';
        this.clearPreview();
        this.uploading = false;
        this.step1Error = '';
        this.error = '';
        if (this.file) {
          // Let the native file picker finish its change cycle before
          // serializing the selected File into FormData.
          var self = this;
          var requestId = this.previewRequest;
          var selectedFile = this.file;
          window.setTimeout(function () {
            self.uploadFile(selectedFile, requestId);
          }, 150);
        }
      },

      uploadFile: function (file, requestId) {
        var selectedFile = file || this.file;
        if (!selectedFile) return;
        var self = this;
        var activeRequest = requestId === undefined ? ++self.previewRequest : requestId;
        if (activeRequest !== self.previewRequest) return;
        self.uploading = true;
        self.step1Error = '';
        self.error = '';
        var fd = new FormData();
        fd.append('file', selectedFile);
        fetch('/api/import/preview', { method: 'POST', body: fd })
          .then(function (r) {
            if (r.ok) return r.json();
            return r.json().then(function (body) {
              throw new Error(body && body.detail ? body.detail : 'Erro ao enviar');
            });
          })
          .then(function (data) {
            if (activeRequest !== self.previewRequest) return;
            self.previewId = data.preview_id;
            self.autoMatched = data.auto_matched || [];
            self.unmatched = data.unmatched || [];
            self.assetClasses = data.asset_classes || [];

            // Build default assignments for ALL rows.
            var assigns = {};

            // Auto-matched: pre-fill with current class and asset name.
            // User can change the class via the dropdown.
            // asset-trade-flags: also pre-fill the three trade-control
            // fields from the server's per-row values so re-imports
            // preserve the operator's prior toggle choices. The
            // preview endpoint emits the asset's current values for
            // auto_matched and project defaults for unmatched.
            var autoMatched = data.auto_matched || [];
            for (var i = 0; i < autoMatched.length; i++) {
              var row = autoMatched[i];
              assigns[row.broker_ticker] = {
                class_id: row.asset_class_id,
                asset_name: row.name,
                buy_enabled: row.buy_enabled !== false,
                sell_enabled: row.sell_enabled !== false,
                currency_code: row.currency_code || 'BRL',
              };
            }

            // Unmatched: use server-suggested class when available,
            // otherwise leave empty for the user to pick. The trade-
            // control fields fall back to the project defaults.
            var unmatched = data.unmatched || [];
            for (var i = 0; i < unmatched.length; i++) {
              var row = unmatched[i];
              var suggested = row.suggested_class_id;
              assigns[row.broker_ticker] = {
                class_id: suggested != null ? suggested : '',
                asset_name: row.name,
                buy_enabled: row.buy_enabled !== false,
                sell_enabled: row.sell_enabled !== false,
                currency_code: row.currency_code || 'BRL',
              };
            }
            self.assignments = assigns;
            self.step = 2;
          })
          .catch(function (err) {
            if (activeRequest !== self.previewRequest) return;
            self.step1Error = err && err.message ? err.message : 'Erro ao processar o arquivo';
          })
          .then(function () {
            if (activeRequest === self.previewRequest) self.uploading = false;
          });
      },

      commit: function () {
        var self = this;
        self.committing = true;
        self.error = '';

        // Build the assignments list from the assignments object.
        // Skip rows where the user did not select a class.
        // asset-trade-flags: include the three trade-control fields
        // so the server's commit handler propagates them to the
        // upsert (auto-matched) or new asset (unmatched). Defaults
        // match the server-side AssignmentItem defaults so the wire
        // shape is identical to before for any row the operator
        // never touched.
        var list = [];
        for (var ticker in self.assignments) {
          if (self.assignments.hasOwnProperty(ticker)) {
            var a = self.assignments[ticker];
            var rawClassId = a.class_id;
            if (rawClassId === '' || rawClassId === null || rawClassId === undefined) continue;
            list.push({
              broker_ticker: ticker,
              class_id: rawClassId,
              asset_name: a.asset_name,
              buy_enabled: a.buy_enabled !== false,
              sell_enabled: a.sell_enabled !== false,
              currency_code: a.currency_code || 'BRL',
            });
          }
        }

        fetch('/api/import/commit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            preview_id: self.previewId,
            assignments: list,
          }),
        })
          .then(function (r) {
            if (r.ok) {
              window.location.reload();
              return;
            }
            return r.json().then(function (body) {
              throw new Error(body && body.detail ? body.detail : 'Erro ao confirmar');
            });
          })
          .catch(function (err) {
            self.error = err && err.message ? err.message : 'Erro ao confirmar a importação';
          })
          .then(function () {
            self.committing = false;
          });
      },

      goBackToStep1: function () {
        this.step = 1;
        this.previewError = false;
        this.error = '';
        this.step1Error = '';
      },
    });

    // asset-table-view 10.2/10.3 — global Alpine store for the dashboard-
    // level add-asset modal. A store (not a component function) so the
    // trigger button in the dashboard-actions area can open it via
    // $store.addAssetModal.openModal() even though the button lives in a
    // different x-data scope.
    Alpine.store('addAssetModal', {
      open: false,
      assetClasses: [],
      classId: '',
      name: '',
      targetPct: '',
      saving: false,
      error: '',

      openModal: function () {
        this.error = '';
        this.name = '';
        this.targetPct = '';
        this.classId = '';
        this.open = true;
      },

      closeModal: function () {
        this.open = false;
        this.error = '';
      },

      submit: function () {
        var self = this;
        self.saving = true;
        self.error = '';

        var payload = {
          name: self.name,
          asset_class_id: self.classId,
        };
        if (self.targetPct !== '') {
          payload.target_pct = self.targetPct;
        }

        fetch('/api/assets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        })
          .then(function (r) {
            if (r.status === 201) {
              // Reload so the new asset row renders with server-side
              // aggregate data (display_order, current_value, percentages).
              window.location.reload();
              return;
            }
            // 409 (duplicate name) or 422 (validation error). Body shape:
            // {"detail": "<message>"}.
            return r.json().then(function (body) {
              var detail = (body && body.detail) ? body.detail : 'Erro ao criar ativo';
              throw new Error(detail);
            });
          })
          .catch(function (err) {
            self.error = err && err.message ? err.message : 'Erro ao criar ativo';
          })
          .then(function () {
            self.saving = false;
          });
      },
    });

    // Hydrate the modal's class list from the server-rendered data.
    Alpine.store('addAssetModal').assetClasses = window.__assetClasses || [];

    // dashboard-action-sidebar — global Alpine store for the new-class
    // modal. Mirrors the addAssetModal shape (open, saving, error,
    // submit) but POSTs to /api/classes. Reloads on 201 so the new
    // class section renders with server-side aggregate data.
    Alpine.store('newClassModal', {
      open: false,
      name: '',
      targetPct: '',
      saving: false,
      error: '',

      openModal: function () {
        this.error = '';
        this.name = '';
        this.targetPct = '';
        this.open = true;
      },

      closeModal: function () {
        this.open = false;
        this.error = '';
        this.name = '';
        this.targetPct = '';
      },

      submit: function () {
        var self = this;
        self.saving = true;
        self.error = '';
        fetch('/api/classes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: self.name, target_pct: self.targetPct }),
        })
          .then(function (r) {
            if (r.status === 201) {
              window.location.reload();
              return;
            }
            return r.json().then(function (body) {
              var detail = (body && body.detail) ? body.detail : 'Erro ao criar classe';
              throw new Error(detail);
            });
          })
          .catch(function (err) {
            self.error = err && err.message ? err.message : 'Erro ao criar classe';
          })
          .then(function () {
            self.saving = false;
          });
      },
    });
  });
</script>
<script type="module">
  import * as formatters from '/static/table-formatters.js';
  import * as filters from '/static/table-filters.js';
  window.__tableFormatters = formatters;
  window.__tableFilters = filters;
</script>
