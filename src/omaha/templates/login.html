{% extends "base.html" %}
{% block title %}Omaha — Login{% endblock %}
{% block content %}
<div class="auth-card">
  <h2>Entrar</h2>
  <p>Digite o usuário e a senha da família para acessar o portfólio.</p>

  {% if error %}<p class="error" data-testid="login-error">{{ error }}</p>{% endif %}

  <form method="post" action="/login">
    <p>
      <label for="username">Usuário</label><br>
      <input id="username" name="username" type="text" value="{{ username }}" required autofocus>
    </p>
    <p>
      <label for="password">Senha</label><br>
      <input id="password" name="password" type="password" required>
    </p>
    <p>
      <button type="submit">Entrar</button>
    </p>
  </form>
</div>
{% endblock %}
