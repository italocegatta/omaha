<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Omaha — Login</title>
</head>
<body>
  <main>
    <h1>Omaha — Login</h1>
    {# T04 replaces this with the production login layout. #}
    {% if error %}<p class="error" data-testid="login-error">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
      <label>Usuário
        <input name="username" type="text" value="{{ username }}" required autofocus>
      </label>
      <label>Senha
        <input name="password" type="password" required>
      </label>
      <button type="submit">Entrar</button>
    </form>
  </main>
</body>
</html>
