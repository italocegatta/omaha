{% extends "base.html" %}
{% block title %}Omaha — Escolher perfil{% endblock %}
{% block content %}
<div class="auth-card">
  <h2>Escolher perfil</h2>
  <p>Olá, {{ user.username }}. Quem está usando o app agora?</p>

  {% for p in profiles %}
    <form class="profile-picker" method="post" action="/profiles/{{ p.id }}/select">
      <button type="submit">{{ p.name }}</button>
    </form>
  {% else %}
    <p>Nenhum perfil cadastrado.</p>
  {% endfor %}
</div>
{% endblock %}
