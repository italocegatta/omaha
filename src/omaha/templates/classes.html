{% extends "base.html" %}
{% block content %}
<div class="class-editor" data-testid="class-editor"
     x-data="classEditor()"
     x-init="addRow()">

  <h1>Classes de ativos</h1>
  <p class="profile-label">Perfil: {{ profile.name }}</p>

  {% if error %}
  <div class="error" data-testid="class-editor-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/classes">
    <table class="class-table">
      <thead>
        <tr>
          <th class="col-name">Nome</th>
          <th class="col-pct">% Target</th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody>
        <template x-for="(row, idx) in rows" :key="row.id">
          <tr>
            <td>
              <input type="text"
                     :name="'name[]'"
                     x-model="row.name"
                     placeholder="Nome da classe"
                     maxlength="64"
                     class="input-name"
                     data-testid="class-editor-name"
                     required>
            </td>
            <td>
              <input type="number"
                     :name="'target_pct[]'"
                     x-model.number="row.targetPct"
                     step="0.01"
                     min="0"
                     max="100"
                     class="input-pct"
                     data-testid="class-editor-pct">
            </td>
            <td>
              <button type="button"
                      class="btn-remove"
                      x-on:click="removeRow(idx)"
                      data-testid="class-editor-remove"
                      :disabled="rows.length <= 1">&#x2715;</button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>

    <div class="class-total table-total"
         :class="Math.abs(total - 100) < 0.01 ? 'total-ok' : 'total-bad'"
         data-testid="class-editor-total">
      <span x-text="totalText"></span>
    </div>

    <div class="class-actions">
      <button type="button"
              class="btn btn-secondary"
              x-on:click="addRow()"
              data-testid="class-editor-add">Adicionar classe</button>
      <button type="submit"
              class="btn btn-primary"
              :disabled="Math.abs(total - 100) >= 0.01 || rows.length === 0"
              data-testid="class-editor-save">Salvar classes</button>
    </div>
  </form>
</div>

<script>
function classEditor() {
  return {
    rows: [],
    get total() {
      var s = 0;
      for (var i = 0; i < this.rows.length; i++) {
        s += parseFloat(this.rows[i].targetPct) || 0;
      }
      return Math.round(s * 100) / 100;
    },
    get totalText() {
      if (this.rows.length === 0) return 'Nenhuma classe';
      if (Math.abs(this.total - 100) < 0.01) return 'Total: ' + this.total.toFixed(2) + '% \u2713';
      var diff = 100 - this.total;
      if (diff > 0) return 'Total: ' + this.total.toFixed(2) + '% -- faltam ' + diff.toFixed(2) + '%';
      return 'Total: ' + this.total.toFixed(2) + '% -- sobram ' + Math.abs(diff).toFixed(2) + '%';
    },
    addRow() {
      this.rows.push({ id: -Date.now() - this.rows.length, name: '', targetPct: 0 });
    },
    removeRow(idx) {
      this.rows.splice(idx, 1);
    },
  };
}
</script>
{% endblock %}
