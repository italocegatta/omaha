{% extends "base.html" %}
{% block title %}Importar CSV - Omaha{% endblock %}
{% block content %}
<div class="import-page">
  <h1>Importar posicoes do broker</h1>
  <p class="profile-label">Perfil ativo: {{ profile.name }}</p>

  {% if error %}
  <p class="error" data-testid="import-error">{{ error }}</p>
  {% endif %}

  <form
    method="post"
    action="/import"
    enctype="multipart/form-data"
    class="import-form"
    data-testid="import-form"
  >
    <label for="import-file">Arquivo CSV do broker</label>
    <input
      type="file"
      id="import-file"
      name="file"
      accept=".csv,text/csv"
      data-testid="import-file"
      required
    >
    <button type="submit" data-testid="import-submit" class="btn btn-primary">
      Importar
    </button>
  </form>
</div>
{% endblock %}
