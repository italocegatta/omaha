# A generic, single-database Alembic configuration tuned for the Omaha app.
#
# The ``sqlalchemy.url`` is intentionally left blank — ``alembic/env.py``
# reads the URL from ``omaha.config.settings.DATABASE_URL`` at runtime so
# tests and production share the same migration code path.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

# ``file_template`` follows the default Alembic layout, but the prefix is
# a sortable 4-digit index (``0001_initial.py``) so future migrations sort
# naturally in directory listings.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# We use a fixed prefix + slug pattern in practice (``0001_initial``), but
# the default template above still works for ``alembic revision`` commands.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
