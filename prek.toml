# Configuration file for `prek`, a Git hook framework written in Rust.
# A drop-in replacement for pre-commit, used to enforce formatting and
# hygiene on every commit. Run manually with `prek run --all-files`.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

# Skip the agent-infrastructure directories: ``.agents/`` ships the
# shared skill library used by the GSD agent (not project code), and
# ``.gsd/`` is the GSD workspace metadata. Pre-commit's own docs
# recommend a top-level ``exclude`` for vendored / generated content.
exclude = '''
(?x)^(
    \.agents/.*
  | \.gsd/.*
  | \.opencode/.*
  | data/.*
  | backups/.*
  | certs/.*
)$
'''

# ── pre-commit stage ─────────────────────────────────────────────────────────
# Fast, non-mutating checks. Runs on every `git commit`.

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
    { id = "check-merge-conflict",     stages = ["pre-commit"] },
    { id = "check-yaml",               stages = ["pre-commit"] },
    { id = "check-toml",               stages = ["pre-commit"] },
    { id = "check-json",               stages = ["pre-commit"] },
    { id = "check-added-large-files",  stages = ["pre-commit"] },
    { id = "detect-private-key",       stages = ["pre-commit"] },
]

[[repos]]
repo = "https://github.com/abravalheri/validate-pyproject"
rev = "v0.24.1"
hooks = [
    { id = "validate-pyproject", stages = ["pre-commit"] },
]

[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.24.3"
hooks = [
    { id = "gitleaks", stages = ["pre-commit"] },
]

[[repos]]
repo = "local"
hooks = [
    { id = "pytest-unit", name = "pytest-unit", entry = "uv run pytest -m unit", language = "system", pass_filenames = false, types = ["python"], stages = ["pre-commit"], priority = 4 },
]

# ── pre-push stage ───────────────────────────────────────────────────────────
# Mutating hooks (format, fix, whitespace, EOF) and slow checks (full test
# suite, type check, lockfile sync, branch validation). Runs on every `git push`.

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.14.3"
hooks = [
    { id = "ruff-format", stages = ["pre-push"], priority = 1, continue-on-error = true },
    { id = "ruff", stages = ["pre-push"], priority = 2 },
]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
    { id = "trailing-whitespace", stages = ["pre-push"], priority = 3 },
    { id = "end-of-file-fixer",   stages = ["pre-push"], priority = 3 },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.19"
hooks = [
    { id = "uv-lock", stages = ["pre-push"], priority = 3 },
]

[[repos]]
repo = "https://github.com/RobertCraigie/pyright-python"
rev = "v1.1.391"
hooks = [
    # Pyright is kept as a manual hook while the existing type-debt backlog
# (reportArgumentType issues across tests and Mapped/ORM protocol mismatches
# in src) is paid down. Run it explicitly with:
#   uv run prek run --hook-stage manual
{ id = "pyright", stages = ["manual"], always_run = true, additional_dependencies = ["fastapi[standard]>=0.115", "sqlalchemy>=2.0", "pydantic>=2.7", "pydantic-settings>=2.4", "pytest>=8.3"] },
]

[[repos]]
repo = "https://github.com/commitizen-tools/commitizen"
rev = "v4.8.0"
hooks = [
    { id = "commitizen-branch", stages = ["pre-push"] },
]

[[repos]]
repo = "local"
hooks = [
    { id = "pytest", name = "pytest", entry = "uv run pytest --ignore=tests/e2e --ignore=tests/audit_integration", language = "system", pass_filenames = false, stages = ["pre-push"], priority = 4 },
]

# ── commit-msg stage ─────────────────────────────────────────────────────────
# Commit-message format validation. Runs on every `git commit`.

[[repos]]
repo = "https://github.com/commitizen-tools/commitizen"
rev = "v4.8.0"
hooks = [
    { id = "commitizen", stages = ["commit-msg"] },
]
